<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🎮 Margin e Padding — Estilo Gamer</h1>
    <div class="padding">
        <h4>🎯 Padding: 30px — espaço interno</h4>
        <h4>O escudo azul cresceu para dentro.</h4>
    </div>
    <div class="margin">
        <h4>⚔️ Margin: 30px — espaço externo</h4>
        <h4>O bloco verde se afastou dos outros.</h4>
    </div>
    <div class="margin_padding">
        <h4>🔥 Margin: 20px + Padding: 20px</h4>
        <h4>Margin afasta por fora. Padding cresce por dentro.</h4>
    </div>
</body>
</html>
